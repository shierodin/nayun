<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>문제 랜덤 룰렛</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}
h1{margin-top:30px;}

.roulette-wrap{
    margin:40px auto;
    width:420px;
    height:420px;
    position:relative;
}

.wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    border:8px solid white;
    position:absolute;
    transition: transform 4s cubic-bezier(.17,.67,.35,1.2);
}

.pointer{
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-bottom:40px solid red;
    position:absolute;
    top:-35px;
    left:50%;
    transform:translateX(-50%);
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#ff4757;
    color:white;
    cursor:pointer;
    margin-top:20px;
}

#result{
    margin-top:30px;
    font-size:28px;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🎡 문제 랜덤 룰렛 🎡</h1>

<div class="roulette-wrap">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" class="wheel"></canvas>
</div>

<button onclick="spin()">룰렛 돌리기</button>
<div id="result"></div>

<script>
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 420;
canvas.height = 420;

let stage = 1; // 1: 버전 선택, 2: 문제 선택
let selectedVersion = 0;
let items = ["Ver 1","Ver 2","Ver 3"];

function drawWheel(list){
    const arc = Math.PI * 2 / list.length;
    for(let i=0;i<list.length;i++){
        ctx.beginPath();
        ctx.moveTo(210,210);
        ctx.arc(210,210,210,i*arc,(i+1)*arc);
        ctx.fillStyle = i%2==0 ? "#1e90ff" : "#3742fa";
        ctx.fill();
        ctx.save();
        ctx.translate(210,210);
        ctx.rotate(i*arc + arc/2);
        ctx.fillStyle="white";
        ctx.font="20px Arial";
        ctx.fillText(list[i],80,10);
        ctx.restore();
    }
}

drawWheel(items);

function spin(){
    const wheel = document.querySelector('.wheel');
    const randomDeg = 3600 + Math.floor(Math.random()*360);
    wheel.style.transform = `rotate(${randomDeg}deg)`;

    setTimeout(()=>{
        const arc = 360/items.length;
        const deg = randomDeg % 360;
        const index = Math.floor((360-deg)/arc) % items.length;

        if(stage===1){
            selectedVersion = index+1;
            document.getElementById("result").innerText =
              `👉 선택된 버전: Ver ${selectedVersion}`;
            stage=2;
            items = ["01","02","03","04","05","06","07","08","09","10"];
            ctx.clearRect(0,0,420,420);
            drawWheel(items);
        }else{
            document.getElementById("result").innerText =
              `🎯 Ver ${selectedVersion} - 문제 ${items[index]}`;
            stage=1;
            items = ["Ver 1","Ver 2","Ver 3"];
            ctx.clearRect(0,0,420,420);
            drawWheel(items);
        }
    },4200);
}
</script>

</body>
</html>
