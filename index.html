<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>텍스트 게임</title>
<style>
body {
    background: #111;
    color: #fff;
    font-family: sans-serif;
    text-align: center;
    padding: 40px;
}
#text {
    font-size: 20px;
    margin-bottom: 30px;
    min-height: 60px;
}
button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="text"></div>
<div id="choices"></div>

<script>
let fire = 0;
let n = 0;

function i() {
    if (n === 1) {
        fire -= 1;
    } else {
        fire += 1;
    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

function setText(t) {
    document.getElementById("text").innerText = t;
}

function setChoices(arr) {
    const div = document.getElementById("choices");
    div.innerHTML = "";
    arr.forEach(choice => {
        const btn = document.createElement("button");
        btn.innerText = choice.text;
        btn.onclick = choice.onClick;
        div.appendChild(btn);
    });
}

async function game() {
    setText("아으! 오늘은 학원 없어서 개꿀잠 자겠네");
    await sleep(1000);

    setText("뭐지; 왜 내가 여기에..");
    await sleep(1000);

    setText("..?! 여기 나윤이 집이자나?!!");
    await sleep(1000);

    setText("그러면 설마.. 내가 나윤이가 된거?!!");

    setChoices([
        { text: "네", onClick: () => { n = 1; i(); next1(); } },
        { text: "아니여, 싫어요", onClick: () => { n = 2; i(); next1(); } }
    ]);
}

async function next1() {
    setChoices([]);
    setText("아침 먹고 나서 또 화장같은 걸 하고..");
    await sleep(1000);

    setText("아오 왤케 많아 빨리 학교 갈끄야");
    await sleep(1000);

    setChoices([
        { text: "인사 해야징", onClick: () => { n = 1; i(); next2(); } },
        { text: "걍 무시해", onClick: () => { n = 2; i(); next2(); } }
    ]);
}

async function next2() {
    setChoices([]);
    setText("아오 오늘 학교 왤케 늦게 끝나");
    await sleep(1000);

    setText("아 수학학원..!");

    setChoices([
        { text: "사랑함", onClick: () => { n = 1; i(); next3(); } },
        { text: "싫어함", onClick: () => { n = 2; i(); next3(); } }
    ]);
}

async function next3() {
    setChoices([]);
    setText("아.. 이제 영어학원??");
    await sleep(1000);

    setChoices([
        { text: "예스 러브", onClick: () => { n = 1; i(); next4(); } },
        { text: "크래이지;;", onClick: () => { n = 2; i(); next4(); } }
    ]);
}

async function next4() {
    setChoices([]);
    setText("아.. 이제 집 와서 숙제까지???");
    await sleep(1000);

    setText("아.. 숙제도 다 했고.. 이제 자야지");
    await sleep(1000);

    if (fire >= 2) {
        setText("...");
        await sleep(1000);
        setText("싸가지 없어");

        for (let i = 0; i < 100; i++) {
            console.log("싸가지 없다고");
        }

    } else if (fire <= 0) {
        setText("...");
        await sleep(1000);
        setText("오늘 하루 좀 괜찮네");
    }
}

game();
</script>

</body>
</html>
