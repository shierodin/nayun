<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ver & 문제 랜덤 룰렛</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    flex-direction:column;
}

.roulette-wrap{
    position:relative;
    width:500px;
    height:500px;
}

canvas{
    border-radius:50%;
    border:10px solid white;
    transition: transform 5s cubic-bezier(.17,.67,.35,1.2);
}

.pointer{
    position:absolute;
    top:-45px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:25px solid transparent;
    border-right:25px solid transparent;
    border-bottom:50px solid red;
}

button{
    margin-top:40px;
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#ff4757;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:35px;
    font-size:32px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="roulette-wrap">
    <div class="pointer"></div>
    <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button onclick="spin()">🎡 룰렛 돌리기</button>
<div id="result"></div>

<audio id="spinSound">
  <source src="https://actions.google.com/sounds/v1/mechanical/ratchet_fast.ogg">
</audio>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const wheel = document.getElementById("wheel");
const sound = document.getElementById("spinSound");

let items = [];
for(let v=1; v<=3; v++){
  for(let q=1; q<=10; q++){
    items.push(`Ver ${v} - ${String(q).padStart(2,'0')}`);
  }
}

function drawWheel(){
  const arc = Math.PI*2/items.length;
  for(let i=0;i<items.length;i++){
    ctx.beginPath();
    ctx.moveTo(250,250);
    ctx.arc(250,250,250,i*arc,(i+1)*arc);
    ctx.fillStyle = i%2? "#3742fa":"#1e90ff";
    ctx.fill();

    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(i*arc + arc/2);
    ctx.fillStyle="white";
    ctx.font="16px Arial";
    ctx.fillText(items[i],120,5);
    ctx.restore();
  }
}
drawWheel();

function spin(){
  sound.currentTime = 0;
  sound.play();

  const randomDeg = 5000 + Math.random()*360;
  wheel.style.transform = `rotate(${randomDeg}deg)`;

  setTimeout(()=>{
    sound.pause();
    const arc = 360/items.length;
    const deg = randomDeg % 360;
    const index = Math.floor((360-deg)/arc) % items.length;
    document.getElementById("result").innerText =
      `🎯 ${items[index]}`;
  },5200);
}
</script>

</body>
</html>
